services:
  hello-py:
    build: ./python
    image: timiajiboye/hello-python:1.0
    ports:
      - "3000:3000"
    environment:
      - ENV_VALUE=${ENV_VALUE_PYTHON}
  hello-node:
    build: ./node
    image: timiajiboye/hello-node:1.0
    ports:
      - "3001:3000"
    environment:
      - ENV_VALUE=${ENV_VALUE_NODE}
